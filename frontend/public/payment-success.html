<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 500px;
      width: 100%;
    }
    .checkmark {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #10b981;
      margin: 0 auto 30px;
      position: relative;
      animation: scale 0.5s ease-out;
    }
    .checkmark::before {
      content: '';
      position: absolute;
      width: 25px;
      height: 50px;
      border: solid white;
      border-width: 0 6px 6px 0;
      top: 20px;
      left: 35px;
      transform: rotate(45deg);
    }
    @keyframes scale {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      color: #1f2937;
      font-size: 32px;
      margin-bottom: 16px;
    }
    p {
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark"></div>
    <h1>Payment Successful!</h1>
    <p>Your payment has been processed successfully. Thank you for your payment.</p>
    <a href="/" class="btn">Return to Home</a>
  </div>
</body>
</html>
